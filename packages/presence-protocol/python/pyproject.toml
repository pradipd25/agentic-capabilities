[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "presence-protocol"
version = "0.1.0"
description = "Transport-agnostic event protocol between an agent adapter and a face renderer"
requires-python = ">=3.11"
dependencies = ["pydantic>=2.10"]

[tool.hatch.build.targets.wheel]
packages = ["presence_protocol"]
