[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agent-face-sdk"
version = "0.1.0"
description = "Headless Python SDK for emitting Agent Face Presence Protocol events"
requires-python = ">=3.11"
dependencies = ["presence-protocol>=0.1.0", "pydantic>=2.10"]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.hatch.build.targets.wheel]
packages = ["agent_face_sdk"]
