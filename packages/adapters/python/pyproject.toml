[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agent-face-adapters"
version = "0.1.0"
description = "Adapters that translate agent sources into the Presence Protocol"
requires-python = ">=3.11"
dependencies = ["presence-protocol>=0.1.0", "pydantic>=2.10"]

[project.optional-dependencies]
claude = ["claude-agent-sdk>=0.1"]
dev = ["pytest>=8.0"]

[tool.hatch.build.targets.wheel]
packages = ["agent_face_adapters"]
